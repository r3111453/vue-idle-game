name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 强制使用 Node.js 24 运行 Actions，消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Override package-lock.json and install sass
        run: |
          rm -f package-lock.json
          npm install --package-lock-only
          npm install sass@1.32.0 --save-dev

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: NODE_OPTIONS="--max_old_space_size=4096" npm run build

      # 新增：自动更新 sitemap.xml 的 lastmod 为当天日期
      - name: Update sitemap lastmod
        run: |
          TODAY=$(date +'%Y-%m-%d')
          if [ -f ./dist/sitemap.xml ]; then
            sed -i "s|<lastmod>.*</lastmod>|<lastmod>$TODAY</lastmod>|" ./dist/sitemap.xml
            echo "Updated sitemap.xml lastmod to $TODAY"
          else
            echo "Warning: dist/sitemap.xml not found, skipping update"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
